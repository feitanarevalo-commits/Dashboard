// derives one from url + channels, attaching the lead's campaigns to the
// primary URL. Reconciles any lead.campaigns not yet mapped to a URL.

    const links = lead.links.map(l => ({
      url: l.url || '',

    url: u,
    campaigns: i === 0 ? [...(lead.campaigns || [])] : []

}
